<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PACE - Progress & Academic Completion Engine</title>
    <script>
      // Silence noisy browser extension errors
      const originalError = console.error;
      console.error = (...args) => {
        const msg = args[0] ? args[0].toString() : '';
        if (msg.includes('solana') || msg.includes('ethereum') || msg.includes('MetaMask') || msg.includes('unpermitted intrinsics')) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
